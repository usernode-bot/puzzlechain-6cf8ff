<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>PuzzleChain</title>
  <!-- Inline data-URI favicon so the browser never requests /favicon.ico,
       which the JWT auth gate would 401 (and that 401 logs a console error
       tripping the no-console-errors check). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0E1A'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%233b82f6'%3E%E2%AC%A2%3C/text%3E%3C/svg%3E">

  <!-- React, ReactDOM, and Babel Standalone are VENDORED locally (public/vendor)
       rather than loaded from a third-party CDN. A blocked/throttled CDN was a
       single point of failure that could leave the app stuck on a blank screen;
       serving these from our own origin removes that dependency while keeping
       the no-build-step, in-browser-compile model below unchanged. -->
  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <script src="/vendor/babel.min.js"></script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <script src="/usernode-loading.js"></script>
  <script src="/usernode-usernames.js"></script>

  <!-- Boot-screen styling: a lightweight loading/error overlay shown before
       React mounts (or if it can't). Plain CSS, no dependency on app.jsx. -->
  <style>
    #pc-boot, #pc-fail {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #0A0E1A; color: #e4e4e7;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 2rem; box-sizing: border-box; text-align: center;
    }
    #pc-boot .pc-spin {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid #1e293b; border-top-color: #3b82f6;
      animation: pc-rot 0.8s linear infinite; margin-bottom: 1rem;
    }
    @keyframes pc-rot { to { transform: rotate(360deg); } }
    #pc-boot .pc-title { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.02em; }
    #pc-boot .pc-sub, #pc-fail .pc-sub { color: #94a3b8; font-size: 0.85rem; margin-top: 0.4rem; max-width: 22rem; }
    .pc-btn {
      display: inline-block; margin-top: 1.25rem; padding: 0.55rem 1.25rem;
      background: #3b82f6; color: #fff; border: none; border-radius: 0.55rem;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .pc-btn:active { transform: translateY(1px); }
    #pc-fail .pc-title { font-size: 1.1rem; font-weight: 600; }
    #pc-fail .pc-mark { font-size: 1.8rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <!-- Initial loading indicator so the user never faces a blank white screen
       while React + Babel load and the ~10k-line app compiles in-browser
       (several seconds on a slow device). React replaces #root on mount, so
       this disappears automatically once the app renders. -->
  <div id="root">
    <div id="pc-boot">
      <div class="pc-spin"></div>
      <div class="pc-title">Loading PuzzleChain…</div>
      <div class="pc-sub">Setting up today's puzzles.</div>
    </div>
  </div>
  <!-- Deterministic JSX bootstrap. Babel Standalone's automatic
       text/babel script-tag scanner is unreliable for external `src`
       files (it silently skipped app.jsx in staging — React never
       mounted). Instead we fetch the source, compile it with the React
       preset in classic-script mode (React.createElement runtime, no ES
       module imports), and inject the compiled code as a plain script so
       it runs in global scope with React/ReactDOM available as globals.
       Any failure surfaces loudly in the console. -->
  <script>
    (function () {
      var booted = false; // set true once we hand off to app.jsx successfully

      function clearRoot() {
        var root = document.getElementById('root');
        if (root) root.innerHTML = '';
        return root;
      }

      // Replace the boot screen with a styled, recoverable error panel instead
      // of a bare line of text the user can't act on.
      function fail(stage, err) {
        booted = true; // stop the watchdog from also firing
        console.error('[PuzzleChain] failed to ' + stage + ':', err && (err.stack || err.message || err));
        var root = clearRoot();
        if (!root) return;
        var panel = document.createElement('div');
        panel.id = 'pc-fail';
        panel.innerHTML =
          '<div class="pc-mark">⚠️</div>' +
          '<div class="pc-title">PuzzleChain didn\'t load</div>' +
          '<div class="pc-sub">Something went wrong while starting up. This is usually a temporary network hiccup — reloading should fix it.</div>' +
          '<button class="pc-btn" type="button">Reload</button>';
        panel.querySelector('button').addEventListener('click', function () { location.reload(); });
        root.appendChild(panel);
      }

      // Watchdog: if the app hasn't mounted (or failed) within ~9s, the boot
      // screen is still on-screen and probably stuck. Offer a one-tap reload
      // instead of leaving the user on a frozen spinner.
      setTimeout(function () {
        if (booted) return;
        var boot = document.getElementById('pc-boot');
        if (!boot) return; // React already mounted and replaced #root
        var sub = boot.querySelector('.pc-sub');
        if (sub) sub.textContent = 'This is taking longer than usual.';
        if (!boot.querySelector('.pc-btn')) {
          var btn = document.createElement('button');
          btn.className = 'pc-btn';
          btn.type = 'button';
          btn.textContent = 'Still loading — Reload';
          btn.addEventListener('click', function () { location.reload(); });
          boot.appendChild(btn);
        }
      }, 9000);

      if (typeof Babel === 'undefined') { fail('load Babel (script blocked?)', new Error('Babel undefined')); return; }
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') { fail('load React (script blocked?)', new Error('React/ReactDOM undefined')); return; }
      fetch('/app.jsx')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching /app.jsx');
          return r.text();
        })
        .then(function (src) {
          var compiled;
          try {
            compiled = Babel.transform(src, { presets: ['react'], sourceType: 'script' }).code;
          } catch (e) { fail('compile app.jsx', e); return; }
          booted = true; // compiled OK; app.jsx now owns the screen
          var s = document.createElement('script');
          s.textContent = compiled + '\n//# sourceURL=app.compiled.js';
          document.body.appendChild(s);
        })
        .catch(function (e) { fail('fetch app.jsx', e); });
    })();
  </script>
</body>
</html>
