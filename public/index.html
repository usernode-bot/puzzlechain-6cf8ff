<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>PuzzleChain</title>
  <!-- rebuild trigger -->
  <!-- Inline data-URI favicon so the browser never requests /favicon.ico,
       which the JWT auth gate would 401 (and that 401 logs a console error
       tripping the no-console-errors check). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0E1A'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%233b82f6'%3E%E2%AC%A2%3C/text%3E%3C/svg%3E">

  <!-- Boot-shell styles only. Self-contained: these must work even when
       app.jsx fails to load/compile, so they do NOT depend on the app's
       design system. Keyframes can't be inlined per-element, hence this
       small block. -->
  <style>
    html, body { margin: 0; }
    body {
      background: #0A0E1A; color: #e7ebf3;
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    }
    #boot-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; padding: 1.5rem;
    }
    #boot-loader .pc-spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid rgba(59,130,246,0.25); border-top-color: #3b82f6;
      animation: pc-spin 0.8s linear infinite;
    }
    #boot-loader .pc-loading-text { color: #8b95a8; font-size: 0.9rem; letter-spacing: 0.02em; }
    @keyframes pc-spin { to { transform: rotate(360deg); } }
    .pc-boot-error {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; padding: 1.5rem; box-sizing: border-box;
    }
    .pc-boot-error .card {
      max-width: 26rem; width: 100%; box-sizing: border-box; text-align: center;
      background: #121726; border: 1px solid #25304a; border-radius: 1rem;
      padding: 1.75rem 1.5rem;
    }
    .pc-boot-error .glyph { font-size: 2.2rem; line-height: 1; margin-bottom: 0.75rem; }
    .pc-boot-error h1 { font-size: 1.2rem; margin: 0 0 0.5rem; color: #e7ebf3; }
    .pc-boot-error p { margin: 0 0 1.25rem; color: #8b95a8; font-size: 0.92rem; line-height: 1.45; }
    .pc-boot-error .btns { display: flex; flex-direction: column; gap: 0.6rem; }
    .pc-boot-error button {
      font: inherit; font-size: 0.92rem; padding: 0.6rem 1rem; border-radius: 0.6rem;
      cursor: pointer; border: 1px solid transparent;
    }
    .pc-boot-error .primary { background: #3b82f6; color: #fff; }
    .pc-boot-error .secondary { background: transparent; color: #cdd5e3; border-color: #25304a; }
    .pc-boot-error .secondary.done { color: #4ade80; border-color: #2f5a3f; }
    .pc-boot-error textarea {
      width: 100%; box-sizing: border-box; margin-top: 0.9rem; height: 5.5rem; resize: vertical;
      background: #0A0E1A; color: #8b95a8; border: 1px solid #25304a; border-radius: 0.5rem;
      padding: 0.5rem; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.72rem;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <script src="/usernode-loading.js"></script>
  <script src="/usernode-usernames.js"></script>
</head>
<body>
  <div id="root">
    <!-- Lightweight pre-mount loading state so the gap between page open and
         React mount isn't a frozen blank screen. React replaces #root's
         contents on mount, removing this. -->
    <div id="boot-loader">
      <div class="pc-spinner"></div>
      <div class="pc-loading-text">Loading PuzzleChain…</div>
    </div>
  </div>
  <!-- Deterministic JSX bootstrap. Babel Standalone's automatic
       text/babel script-tag scanner is unreliable for external `src`
       files (it silently skipped app.jsx in staging — React never
       mounted). Instead we fetch the source, compile it with the React
       preset in classic-script mode (React.createElement runtime, no ES
       module imports), and inject the compiled code as a plain script so
       it runs in global scope with React/ReactDOM available as globals.
       Any failure surfaces loudly in the console AND in an on-screen
       error card so a non-technical player can retry and report it. -->
  <script>
    (function () {
      var WATCHDOG_MS = 15000;
      var watchdog = null;
      var settled = false; // true once we've either mounted or shown an error

      // Plain-English reason derived from the failure stage, so the card
      // tells a player *what kind* of problem this is without a console.
      function reasonFor(stage) {
        var s = String(stage || '');
        if (/compile|run/.test(s)) return "There's a problem with the latest update. Try reloading — if it keeps happening, please report it.";
        if (/load|fetch|babel|react|cdn/i.test(s)) return "We couldn't reach the network (or a required file is blocked). Check your connection and reload.";
        if (/longer|slow|watchdog/i.test(s)) return "This is taking longer than usual — check your connection and reload.";
        return "Something went wrong while starting the app. Try reloading.";
      }

      function clearWatchdog() {
        if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      // Render the self-contained error card into #root. Always replaces
      // #root's contents (loader or stale fallback) so the latest state wins.
      function showError(stage, err) {
        settled = true;
        clearWatchdog();
        var root = document.getElementById('root');
        if (!root) return;
        var detail = stage + ': ' + (err && (err.stack || err.message || err) || 'unknown error');

        var wrap = document.createElement('div');
        wrap.className = 'pc-boot-error';
        wrap.innerHTML =
          '<div class="card">' +
            '<div class="glyph">⬢</div>' +
            '<h1>PuzzleChain couldn’t start</h1>' +
            '<p>' + escapeHtml(reasonFor(stage)) + '</p>' +
            '<div class="btns">' +
              '<button type="button" class="primary" data-act="reload">Reload</button>' +
              '<button type="button" class="secondary" data-act="copy">Copy error details</button>' +
            '</div>' +
          '</div>';
        root.innerHTML = '';
        root.appendChild(wrap);

        var card = wrap.querySelector('.card');
        wrap.querySelector('[data-act="reload"]').addEventListener('click', function () {
          location.reload();
        });

        var copyBtn = wrap.querySelector('[data-act="copy"]');
        copyBtn.addEventListener('click', function () {
          function markCopied() {
            copyBtn.textContent = 'Copied ✓';
            copyBtn.className = 'secondary done';
          }
          // navigator.clipboard is unavailable in insecure contexts / older
          // mobile browsers — fall back to a selectable textarea.
          function fallback() {
            if (card.querySelector('textarea')) { card.querySelector('textarea').select(); return; }
            var ta = document.createElement('textarea');
            ta.readOnly = true;
            ta.value = detail;
            card.appendChild(ta);
            ta.focus(); ta.select();
            try { document.execCommand && document.execCommand('copy'); markCopied(); } catch (_) {}
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(detail).then(markCopied, fallback);
          } else {
            fallback();
          }
        });
      }

      function fail(stage, err) {
        console.error('[PuzzleChain] failed to ' + stage + ':', err && (err.stack || err.message || err));
        showError(stage, err);
      }

      if (typeof Babel === 'undefined') { fail('load Babel (CDN blocked?)', new Error('Babel undefined')); return; }
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') { fail('load React (CDN blocked?)', new Error('React/ReactDOM undefined')); return; }

      // Mount watchdog: if React hasn't replaced the loader with real content
      // within WATCHDOG_MS, surface the "taking longer than usual" card rather
      // than leaving a player on an indefinitely blank/spinning screen.
      watchdog = setTimeout(function () {
        if (settled) return;
        var root = document.getElementById('root');
        var mounted = window.__puzzlechainMounted ||
          (root && root.firstElementChild && root.firstElementChild.id !== 'boot-loader');
        if (mounted) { settled = true; return; }
        fail('start (taking longer than usual)', new Error('mount watchdog timed out after ' + WATCHDOG_MS + 'ms'));
      }, WATCHDOG_MS);

      fetch('/app.jsx')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching /app.jsx');
          return r.text();
        })
        .then(function (src) {
          var compiled;
          try {
            compiled = Babel.transform(src, { presets: ['react'], sourceType: 'script', compact: true }).code;
          } catch (e) { fail('compile app.jsx', e); return; }
          // Wrap execution so a runtime throw during eval is routed to the
          // error card instead of dying silently with a blank #root.
          try {
            var run = new Function(compiled + '\n//# sourceURL=app.compiled.js');
            run();
          } catch (e) { fail('run app.jsx', e); return; }
          // App marks itself mounted; also detect via real #root content.
          requestAnimationFrame(function () {
            var root = document.getElementById('root');
            var mounted = window.__puzzlechainMounted ||
              (root && root.firstElementChild && root.firstElementChild.id !== 'boot-loader');
            if (mounted) { settled = true; clearWatchdog(); }
          });
        })
        .catch(function (e) { fail('fetch app.jsx', e); });
    })();
  </script>
</body>
</html>
