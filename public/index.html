<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>PuzzleChain</title>
  <!-- Inline data-URI favicon so the browser never requests /favicon.ico,
       which the JWT auth gate would 401 (and that 401 logs a console error
       tripping the no-console-errors check). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0D14'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%236366F1'%3E%E2%AC%A2%3C/text%3E%3C/svg%3E">

  <!-- Boot-shell styles only. Self-contained: these must work even when
       app.jsx fails to load/compile, so they do NOT depend on the app's
       design system. Keyframes can't be inlined per-element, hence this
       small block. -->
  <style>
    html, body { margin: 0; }
    body {
      background: #0A0D14; color: #ECEFF6;
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    }
    #boot-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; padding: 1.5rem;
    }
    #boot-loader .pc-spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,0.25); border-top-color: #6366F1;
      animation: pc-spin 0.8s linear infinite;
    }
    #boot-loader .pc-loading-text { color: #8b95a8; font-size: 0.9rem; letter-spacing: 0.02em; }
    @keyframes pc-spin { to { transform: rotate(360deg); } }
    .pc-boot-error {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; padding: 1.5rem; box-sizing: border-box;
    }
    .pc-boot-error .card {
      max-width: 26rem; width: 100%; box-sizing: border-box; text-align: center;
      background: #181D29; border: 1px solid #2A3342; border-radius: 1rem;
      padding: 1.75rem 1.5rem;
    }
    .pc-boot-error .glyph { font-size: 2.2rem; line-height: 1; margin-bottom: 0.75rem; }
    .pc-boot-error h1 { font-size: 1.2rem; margin: 0 0 0.5rem; color: #ECEFF6; }
    .pc-boot-error p { margin: 0 0 1.25rem; color: #8b95a8; font-size: 0.92rem; line-height: 1.45; }
    .pc-boot-error .btns { display: flex; flex-direction: column; gap: 0.6rem; }
    .pc-boot-error button {
      font: inherit; font-size: 0.92rem; padding: 0.6rem 1rem; border-radius: 0.6rem;
      cursor: pointer; border: 1px solid transparent;
    }
    .pc-boot-error .primary { background: #6366F1; color: #fff; }
    .pc-boot-error .secondary { background: transparent; color: #cdd5e3; border-color: #2A3342; }
    .pc-boot-error .secondary.done { color: #34D399; border-color: #2f5a3f; }
    .pc-boot-error textarea {
      width: 100%; box-sizing: border-box; margin-top: 0.9rem; height: 5.5rem; resize: vertical;
      background: #0A0D14; color: #8B95A8; border: 1px solid #2A3342; border-radius: 0.5rem;
      padding: 0.5rem; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.72rem;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <script src="/usernode-loading.js"></script>
  <script src="/usernode-usernames.js"></script>
</head>
<body>
  <div id="root">
    <!-- Lightweight pre-mount loading state so the gap between page open and
         React mount isn't a frozen blank screen. React replaces #root's
         contents on mount, removing this. -->
    <div id="boot-loader">
      <div class="pc-spinner"></div>
      <div class="pc-loading-text">Loading PuzzleChain…</div>
    </div>
  </div>
  <!-- app.jsx is pre-compiled to app.js by esbuild at build time (see Dockerfile).
       Loading it as a plain script avoids Babel Standalone’s 500 KB deoptimisation
       warning while keeping the same global-scope React classic-script runtime. -->
  <script>
    (function () {
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        document.getElementById('root').innerHTML =
          '<div class="pc-boot-error"><div class="card"><div class="glyph">⬢</div>' +
          '<h1>PuzzleChain couldn\'t start</h1>' +
          '<p>React failed to load. Check your connection and reload.</p>' +
          '<div class="btns"><button type="button" class="primary" onclick="location.reload()">Reload</button></div>' +
          '</div></div>';
        return;
      }
      // Watchdog: surface an error card if the app hasn't mounted within 15 s.
      window.__pcWatchdog = setTimeout(function () {
        var root = document.getElementById('root');
        var mounted = window.__puzzlechainMounted ||
          (root && root.firstElementChild && root.firstElementChild.id !== 'boot-loader');
        if (!mounted) {
          root.innerHTML =
            '<div class="pc-boot-error"><div class="card"><div class="glyph">⬢</div>' +
            '<h1>PuzzleChain couldn\'t start</h1>' +
            '<p>This is taking longer than usual — check your connection and reload.</p>' +
            '<div class="btns"><button type="button" class="primary" onclick="location.reload()">Reload</button></div>' +
            '</div></div>';
        }
      }, 15000);
    })();
  </script>
  <script src="/app.js" onerror="clearTimeout(window.__pcWatchdog);document.getElementById('root').innerHTML='<div class=pc-boot-error><div class=card><div class=glyph>⬢</div><h1>PuzzleChain couldn\'t start</h1><p>Failed to load app. Try reloading.</p><div class=btns><button class=primary onclick=location.reload()>Reload</button></div></div></div>'"></script>
</body>
</html>
